<head>

    <title>MOD App | Komite Odası</title>
    <style>
        :root {
            --bg-dark: #000000;
            --text-main: #E5E5E5;
            --text-sec: #A1A1AA;
            --mod-accent: #0a9396;
            --mod-deep: #005f73;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 40px 20px 80px 20px; 
            overflow-x: hidden;
            position: relative;
        }

        /* 1. KUZEY IŞIKLARI (AURA) - Kesintisiz Deneyim */
        .aura-1 {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 60vh;
            background: var(--mod-accent);
            filter: blur(140px);
            opacity: 0.20;
            transform: rotate(-10deg);
            animation: wave 12s infinite alternate cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 0;
            pointer-events: none;
        }

        .aura-2 {
            position: fixed;
            bottom: -10%; right: -10%;
            width: 120%; height: 60vh;
            background: var(--mod-deep);
            filter: blur(160px);
            opacity: 0.25;
            transform: rotate(10deg);
            animation: wave-reverse 15s infinite alternate cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 0;
            pointer-events: none;
        }

        @keyframes wave {
            0% { transform: rotate(-10deg) translateY(0) scale(1); }
            100% { transform: rotate(-5deg) translateY(-40px) scale(1.1); }
        }

        @keyframes wave-reverse {
            0% { transform: rotate(10deg) translateY(0) scale(1); }
            100% { transform: rotate(15deg) translateY(40px) scale(1.1); }
        }

        /* 2. ANA KONTEYNER VE BUTONLAR */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
        }

        .back-btn { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: var(--text-sec); 
            padding: 12px 24px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: 500;
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            margin-bottom: 40px; 
        }

        .back-btn:hover { 
            color: var(--text-main); 
            background: rgba(255, 255, 255, 0.08); 
            transform: translateX(-4px);
        }

        .header-section { text-align: center; margin-bottom: 50px; }
        
        .committee-title { 
            font-size: 42px; 
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px; 
            color: var(--text-main); 
        }
        
        #pageDesc { color: var(--text-sec); font-size: 15px; margin-bottom: 4px; }
        #pageDate { color: var(--mod-accent); font-size: 13px; font-weight: 500; letter-spacing: 1px; }

        /* 3. DERS AKORDİYONLARI (GLASSMORPHISM) */
        .lessons-container { display: flex; flex-direction: column; gap: 16px; }
        
        .lesson-item { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 20px; 
            overflow: hidden; 
            border-left: 4px solid var(--mod-deep);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lesson-item:hover {
            border-left-color: var(--mod-accent);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .lesson-header { 
            padding: 24px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 18px;
            font-weight: 500;
        }

        .lesson-header .arrow-icon {
            color: var(--text-sec);
            font-size: 16px;
            transition: transform 0.4s ease;
        }

        .lesson-item.active .lesson-header .arrow-icon {
            transform: rotate(180deg);
            color: var(--mod-accent);
        }

        /* 4. DERS İÇERİK LİNKLERİ */
        .lesson-content { 
            display: none; 
            padding: 0 24px 24px 24px; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 12px; 
        }
        
        .lesson-item.active .lesson-content { display: grid; }
        
        .resource-link { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px; 
            border-radius: 14px; 
            text-decoration: none; 
            color: var(--text-sec); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            text-align: center; 
            font-size: 14px;
            transition: all 0.3s ease; 
        }
        
        .resource-link:hover { 
            background: var(--mod-deep); 
            color: #FFF;
            border-color: var(--mod-accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(10, 147, 150, 0.2);
        }

        /* FİNAL ÖZEL BUTONLARI */
        .final-resource {
            padding: 24px;
            font-size: 16px;
            font-weight: 500;
            border-left: 4px solid var(--mod-accent);
        }

        /* RESMİ İMZA */
        .designer-signature {
            margin-top: 80px;
            text-align: center;
            font-size: 11px;
            color: var(--text-sec);
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

            if(!data) { document.getElementById('pageTitle').innerText = "Hata: Komite Bulunamadı!"; return; }
            
            document.getElementById('pageTitle').innerText = data.title;
            document.getElementById('pageDesc').innerText = data.desc;
            document.getElementById('pageDate').innerText = data.date ? "Sınav Tarihi: " + data.date : "";

            const container = document.getElementById('lessonsContainer');
            
            if(committeeId === 'final') {
                container.innerHTML = `
                    <a href="${data.diamondLink}" class="resource-link final-resource" target="_blank">💎 Diamond Testler</a>
                    <a href="${data.modFinalLink}" class="resource-link final-resource" target="_blank" style="border-left-color: var(--mod-deep);">🎯 MOD Final Kaynakları</a>
                `;
            } else {
                data.lessons.forEach(lesson => {
                    container.innerHTML += `
                        <div class="lesson-item" onclick="this.classList.toggle('active')">
                            <div class="lesson-header">
                                <span>${lesson.icon} ${lesson.name}</span>
                                <span class="arrow-icon">▼</span>
                            </div>
                            <div class="lesson-content">
                                <a href="${lesson.links.ozet}" target="_blank" class="resource-link">📝 Özet</a>
                                <a href="${lesson.links.test}" target="_blank" class="resource-link">🎯 Test</a>
                                <a href="${lesson.links.ai}" target="_blank" class="resource-link">🧠 NotebookLM Odası</a>
                                <a href="${lesson.links.slayt}" target="_blank" class="resource-link">📊 Slayt</a>
                            </div>
                        </div>`;
                });
            }
        };
    </script>
</body>
</html>
